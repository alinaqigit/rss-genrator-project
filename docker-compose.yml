  #     postgres:
  #       condition: service_healthy
  #   environment:
  #     DB_HOST: postgres
  #     DB_PORT: 5432
  #     DB_USER: ${DB_USER:-postgres}
  #     DB_PASSWORD: ${DB_PASSWORD:-postgres}
  #     DB_NAME: ${DB_NAME:-rss_generator}
  #     HOST: 0.0.0.0
  #     PORT: 8080
  #   ports:
  #     - "8000:8080"
  #   networks:
  #     - rss_network

volumes:
  postgres_data:

networks:
  rss_network:
    driver: bridge